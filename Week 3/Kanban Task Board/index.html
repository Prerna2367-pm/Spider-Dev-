<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📋 Kanban Task Board</h1>

    <div class="header-buttons">
        <button id="themeBtn">🌙 Dark Mode</button>
        <button id="clearBtn">🗑 Clear All</button>
    </div>
</header>

<div class="task-form">

    <input
        type="text"
        id="taskInput"
        placeholder="Enter task..."
        maxlength="60">

    <span id="charCount">0 / 60</span>

    <select id="priority">
        <option value="High">🔴 High</option>
        <option value="Medium">🟡 Medium</option>
        <option value="Low">🟢 Low</option>
    </select>

    <span id="previewBadge" class="badge high">
        High
    </span>

    <button id="addTask">
        Add Task
    </button>

</div>

<div class="board">

    <!-- TO DO -->
    <div class="column"
        id="todo"
        ondragover="allowDrop(event)"
        ondrop="drop(event)">

        <h2>
            To Do
            (<span id="todoCount">0</span>)
        </h2>

        <div class="task-list"></div>

    </div>

    <!-- IN PROGRESS -->
    <div class="column"
        id="progress"
        ondragover="allowDrop(event)"
        ondrop="drop(event)">

        <h2>
            In Progress
            (<span id="progressCount">0</span>)
        </h2>

        <div class="task-list"></div>

    </div>

    <!-- DONE -->
    <div class="column"
        id="done"
        ondragover="allowDrop(event)"
        ondrop="drop(event)">

        <h2>
            Done
            (<span id="doneCount">0</span>)
        </h2>

        <div class="task-list"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
